<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Klasik</title>
<style>
  /* ===== STYLING GLOBAL ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #111;
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
  }

  h1 {
    letter-spacing: 8px;
    font-size: 28px;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
  }

  #gameCanvas {
    background: #000;
    border: 3px solid #fff;
    box-shadow: 0 0 20px rgba(255,255,255,0.25);
    display: block;
  }

  .controls-info {
    font-size: 13px;
    color: #aaa;
    text-align: center;
    line-height: 1.6;
  }

  #restartBtn {
    background: #000;
    color: #fff;
    border: 2px solid #fff;
    padding: 10px 24px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.15s ease;
  }

  #restartBtn:hover {
    background: #fff;
    color: #000;
  }

  #restartBtn:active {
    transform: scale(0.96);
  }
</style>
</head>
<body>

  <h1>P O N G</h1>

  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <div class="controls-info">
    Pemain (Kiri): Tombol <b>W</b> / <b>S</b> atau <b>↑</b> / <b>↓</b><br>
    Lawan (Kanan): Dikendalikan oleh AI
  </div>

  <button id="restartBtn">RESTART SKOR</button>

<script>
(function () {
  "use strict";

  /* =========================================================
     1. INISIALISASI DASAR
     ========================================================= */
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const restartBtn = document.getElementById("restartBtn");

  const WIDTH = canvas.width;   // 800
  const HEIGHT = canvas.height; // 400

  // Konfigurasi paddle
  const PADDLE_WIDTH = 12;
  const PADDLE_HEIGHT = 80;
  const PADDLE_MARGIN = 20;     // jarak paddle dari tepi kanvas

  // Konfigurasi bola
  const BALL_SIZE = 10;
  const BALL_INITIAL_SPEED = 4;
  const BALL_SPEED_INCREMENT = 0.2;
  const BALL_MAX_SPEED = 11;

  // Kecepatan gerak
  const PLAYER_SPEED = 6;   // kecepatan paddle pemain (5-6 px/frame)
  const AI_SPEED = 4.5;     // kecepatan AI, sengaja lebih lambat dari bola maksimal
  const AI_REACTION_DEADZONE = 12; // AI hanya bergerak jika jarak vertikal > nilai ini (efek jeda reaksi)

  // Objek state permainan
  const state = {
    player: {
      x: PADDLE_MARGIN,
      y: HEIGHT / 2 - PADDLE_HEIGHT / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      score: 0
    },
    ai: {
      x: WIDTH - PADDLE_MARGIN - PADDLE_WIDTH,
      y: HEIGHT / 2 - PADDLE_HEIGHT / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      score: 0
    },
    ball: {
      x: WIDTH / 2 - BALL_SIZE / 2,
      y: HEIGHT / 2 - BALL_SIZE / 2,
      size: BALL_SIZE,
      speed: BALL_INITIAL_SPEED,
      vx: BALL_INITIAL_SPEED,
      vy: 0
    }
  };

  /* =========================================================
     2. INPUT KEYBOARD
     ========================================================= */
  const keys = {
    up: false,   // W atau ArrowUp
    down: false  // S atau ArrowDown
  };

  window.addEventListener("keydown", (e) => {
    switch (e.key) {
      case "w":
      case "W":
      case "ArrowUp":
        keys.up = true;
        e.preventDefault();
        break;
      case "s":
      case "S":
      case "ArrowDown":
        keys.down = true;
        e.preventDefault();
        break;
    }
  });

  window.addEventListener("keyup", (e) => {
    switch (e.key) {
      case "w":
      case "W":
      case "ArrowUp":
        keys.up = false;
        break;
      case "s":
      case "S":
      case "ArrowDown":
        keys.down = false;
        break;
    }
  });

  /* =========================================================
     3. WEB AUDIO API - EFEK SUARA SEDERHANA
     ========================================================= */
  let audioCtx = null;

  function getAudioContext() {
    // Dibuat lazy karena beberapa browser butuh interaksi user dulu
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playBeep(frequency, duration, type = "square", volume = 0.15) {
    try {
      const ac = getAudioContext();
      const oscillator = ac.createOscillator();
      const gainNode = ac.createGain();

      oscillator.type = type;
      oscillator.frequency.value = frequency;
      gainNode.gain.value = volume;

      oscillator.connect(gainNode);
      gainNode.connect(ac.destination);

      oscillator.start();
      // Fade out singkat agar tidak terdengar "klik" kasar
      gainNode.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
      oscillator.stop(ac.currentTime + duration);
    } catch (err) {
      // Jika Web Audio API tidak didukung, abaikan saja tanpa mengganggu game
      console.warn("Audio tidak tersedia:", err);
    }
  }

  function playHitSound() {
    playBeep(220, 0.08, "square", 0.12);
  }

  function playScoreSound() {
    playBeep(110, 0.35, "sawtooth", 0.18);
  }

  /* =========================================================
     4. FUNGSI RESET BOLA
     ========================================================= */
  function resetBall(direction) {
    // direction: 1 = ke kanan (arah AI), -1 = ke kiri (arah pemain)
    state.ball.x = WIDTH / 2 - BALL_SIZE / 2;
    state.ball.y = HEIGHT / 2 - BALL_SIZE / 2;
    state.ball.speed = BALL_INITIAL_SPEED;

    // Sudut awal acak ringan agar tidak monoton lurus horizontal terus
    const randomAngle = (Math.random() * 0.6 - 0.3); // antara -0.3 dan 0.3 radian
    state.ball.vx = direction * Math.cos(randomAngle) * state.ball.speed;
    state.ball.vy = Math.sin(randomAngle) * state.ball.speed;
  }

  /* =========================================================
     5. UPDATE POSISI PADDLE PEMAIN
     ========================================================= */
  function updatePlayer() {
    if (keys.up) {
      state.player.y -= PLAYER_SPEED;
    }
    if (keys.down) {
      state.player.y += PLAYER_SPEED;
    }

    // Batasi agar paddle tidak keluar dari kanvas
    state.player.y = Math.max(0, Math.min(HEIGHT - state.player.height, state.player.y));
  }

  /* =========================================================
     6. UPDATE LOGIKA AI (dengan efek human-error)
     ========================================================= */
  function updateAI() {
    const aiCenter = state.ai.y + state.ai.height / 2;
    const ballCenter = state.ball.y + state.ball.size / 2;
    const distance = ballCenter - aiCenter;

    // AI hanya bereaksi jika jarak cukup jauh (simulasi jeda reaksi manusia)
    if (Math.abs(distance) > AI_REACTION_DEADZONE) {
      if (distance > 0) {
        state.ai.y += AI_SPEED;
      } else {
        state.ai.y -= AI_SPEED;
      }
    }

    // Batasi agar paddle AI tidak keluar dari kanvas
    state.ai.y = Math.max(0, Math.min(HEIGHT - state.ai.height, state.ai.y));
  }

  /* =========================================================
     7. UPDATE FISIKA BOLA & DETEKSI TABRAKAN
     ========================================================= */
  function updateBall() {
    const ball = state.ball;

    ball.x += ball.vx;
    ball.y += ball.vy;

    // Pantulan di dinding atas & bawah
    if (ball.y <= 0) {
      ball.y = 0;
      ball.vy *= -1;
    } else if (ball.y + ball.size >= HEIGHT) {
      ball.y = HEIGHT - ball.size;
      ball.vy *= -1;
    }

    // ---- Tabrakan dengan paddle PEMAIN (kiri) ----
    if (
      ball.x <= state.player.x + state.player.width &&
      ball.x + ball.size >= state.player.x &&
      ball.y + ball.size >= state.player.y &&
      ball.y <= state.player.y + state.player.height &&
      ball.vx < 0 // pastikan bola sedang bergerak ke kiri (menuju paddle ini)
    ) {
      handlePaddleHit(state.player, 1); // pantulkan ke kanan
      playHitSound();
    }

    // ---- Tabrakan dengan paddle AI (kanan) ----
    if (
      ball.x + ball.size >= state.ai.x &&
      ball.x <= state.ai.x + state.ai.width &&
      ball.y + ball.size >= state.ai.y &&
      ball.y <= state.ai.y + state.ai.height &&
      ball.vx > 0 // pastikan bola sedang bergerak ke kanan (menuju paddle ini)
    ) {
      handlePaddleHit(state.ai, -1); // pantulkan ke kiri
      playHitSound();
    }

    // ---- Gol: bola melewati paddle kiri (pemain kebobolan) ----
    if (ball.x + ball.size < 0) {
      state.ai.score += 1;
      playScoreSound();
      resetBall(-1); // bola meluncur ke arah pemain yang kalah (pemain)
    }

    // ---- Gol: bola melewati paddle kanan (AI kebobolan) ----
    if (ball.x > WIDTH) {
      state.player.score += 1;
      playScoreSound();
      resetBall(1); // bola meluncur ke arah AI yang kalah
    }
  }

  // Menangani pantulan dinamis berdasarkan titik tumbukan pada paddle
  function handlePaddleHit(paddle, newDirection) {
    const ball = state.ball;

    const paddleCenter = paddle.y + paddle.height / 2;
    const ballCenter = ball.y + ball.size / 2;

    // Selisih posisi relatif (-1 di ujung atas, 0 di tengah, +1 di ujung bawah)
    let relativeIntersect = (ballCenter - paddleCenter) / (paddle.height / 2);
    relativeIntersect = Math.max(-1, Math.min(1, relativeIntersect));

    // Sudut pantulan maksimum ~ 60 derajat (dalam radian)
    const maxBounceAngle = Math.PI / 3;
    const bounceAngle = relativeIntersect * maxBounceAngle;

    // Tambah kecepatan bola sedikit demi sedikit tiap rally, dengan batas maksimum
    ball.speed = Math.min(ball.speed + BALL_SPEED_INCREMENT, BALL_MAX_SPEED);

    ball.vx = newDirection * Math.cos(bounceAngle) * ball.speed;
    ball.vy = Math.sin(bounceAngle) * ball.speed;

    // Dorong bola sedikit keluar dari paddle agar tidak "nyangkut" akibat deteksi berulang
    if (newDirection === 1) {
      ball.x = paddle.x + paddle.width + 1;
    } else {
      ball.x = paddle.x - ball.size - 1;
    }
  }

  /* =========================================================
     8. RENDERING (GAMBAR SEMUA ELEMEN)
     ========================================================= */
  function draw() {
    // Latar belakang hitam pekat
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    // Garis putus-putus di tengah lapangan
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 4;
    ctx.setLineDash([12, 12]);
    ctx.beginPath();
    ctx.moveTo(WIDTH / 2, 0);
    ctx.lineTo(WIDTH / 2, HEIGHT);
    ctx.stroke();
    ctx.setLineDash([]); // reset dash agar tidak mempengaruhi gambar lain

    // Paddle pemain
    ctx.fillStyle = "#fff";
    ctx.fillRect(state.player.x, state.player.y, state.player.width, state.player.height);

    // Paddle AI
    ctx.fillStyle = "#fff";
    ctx.fillRect(state.ai.x, state.ai.y, state.ai.width, state.ai.height);

    // Bola
    ctx.fillStyle = "#fff";
    ctx.fillRect(state.ball.x, state.ball.y, state.ball.size, state.ball.size);

    // Skor
    ctx.font = "48px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.fillText(state.player.score, WIDTH / 2 - 80, 60);
    ctx.fillText(state.ai.score, WIDTH / 2 + 80, 60);
  }

  /* =========================================================
     9. GAME LOOP UTAMA
     ========================================================= */
  function gameLoop() {
    updatePlayer();
    updateAI();
    updateBall();
    draw();

    requestAnimationFrame(gameLoop);
  }

  /* =========================================================
     10. TOMBOL RESTART (reset skor menjadi 0-0)
     ========================================================= */
  restartBtn.addEventListener("click", () => {
    state.player.score = 0;
    state.ai.score = 0;
    state.player.y = HEIGHT / 2 - PADDLE_HEIGHT / 2;
    state.ai.y = HEIGHT / 2 - PADDLE_HEIGHT / 2;
    resetBall(Math.random() < 0.5 ? 1 : -1);
  });

  /* =========================================================
     11. MULAI PERMAINAN
     ========================================================= */
  resetBall(Math.random() < 0.5 ? 1 : -1);
  requestAnimationFrame(gameLoop);

})();
</script>

</body>
</html>
