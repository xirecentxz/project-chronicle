<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphic Clock</title>
<style>
  :root{
    --bg: #1a1a20;
    --accent: #c9acff;
    --dark-shadow: #101014;
    --light-shadow: #232329;
    --text-muted: #8a8a95;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body{
    background-color: var(--bg);
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 40px 40px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: #e5e5ea;
    padding: clamp(1.5rem, 5vw, 4rem);
  }

  .wrapper{
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: clamp(2rem, 6vw, 6rem);
    max-width: 1100px;
    width: 100%;
  }

  .info{
    flex: 1;
    min-width: 240px;
    max-width: 420px;
  }

  .info h1{
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    color: var(--accent);
    margin: 0 0 0.6em 0;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }

  .info p{
    font-size: clamp(0.9rem, 1.6vw, 1.05rem);
    color: var(--text-muted);
    line-height: 1.6;
    margin: 0 0 1.4em 0;
  }

  .digital-readout{
    display: inline-flex;
    align-items: center;
    gap: 0.5em;
    padding: 0.7em 1.2em;
    border-radius: 14px;
    background: var(--bg);
    box-shadow:
      inset 5px 5px 10px var(--dark-shadow),
      inset -5px -5px 10px var(--light-shadow);
    font-variant-numeric: tabular-nums;
    font-size: clamp(1rem, 2vw, 1.3rem);
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  /* ===== CLOCK ===== */
  .clock-outer{
    flex-shrink: 0;
    width: min(350px, 70vmin);
    height: min(350px, 70vmin);
    border-radius: 50%;
    background: var(--bg);
    box-shadow:
      14px 14px 28px var(--dark-shadow),
      -14px -14px 28px var(--light-shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6%;
  }

  .clock-face{
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--bg);
    box-shadow:
      inset 8px 8px 16px var(--dark-shadow),
      inset -8px -8px 16px var(--light-shadow);
  }

  /* Hour markers */
  .marker{
    position: absolute;
    top: 50%;
    left: 50%;
    width: 3px;
    height: 8%;
    background: var(--text-muted);
    border-radius: 4px;
    transform-origin: 50% 0%;
    opacity: 0.55;
  }

  .marker.major{
    width: 5px;
    height: 13%;
    background: var(--accent);
    opacity: 0.95;
    border-radius: 6px;
  }

  /* place markers at the offset from center to edge, then rotate */
  .marker{
    margin-left: -1.5px;
    margin-top: 0;
    top: 4%;
  }
  .marker.major{
    margin-left: -2.5px;
  }

  /* Hands */
  .hand{
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: 50% 100%;
    border-radius: 6px;
  }

  .hour-hand{
    width: 10px;
    margin-left: -5px;
    height: 26%;
    background: linear-gradient(180deg, #e5e5ea, #b8b8c2);
    clip-path: polygon(20% 100%, 80% 100%, 65% 8%, 50% 0%, 35% 8%);
    box-shadow: 0 0 6px rgba(0,0,0,0.4);
    transition: transform 0.3s cubic-bezier(0.4, 2.08, 0.55, 0.44);
    z-index: 3;
  }

  .minute-hand{
    width: 7px;
    margin-left: -3.5px;
    height: 38%;
    background: linear-gradient(180deg, #e5e5ea, #b8b8c2);
    clip-path: polygon(22% 100%, 78% 100%, 62% 6%, 50% 0%, 38% 6%);
    box-shadow: 0 0 6px rgba(0,0,0,0.35);
    transition: transform 0.3s cubic-bezier(0.4, 2.08, 0.55, 0.44);
    z-index: 4;
  }

  .second-hand{
    width: 2px;
    margin-left: -1px;
    height: 42%;
    background: var(--accent);
    transition: transform 0.3s cubic-bezier(0.4, 2.08, 0.55, 0.44);
    z-index: 5;
  }

  /* counterweight tail of the second hand, extends past center */
  .second-hand::after{
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    width: 2px;
    height: 15%;
    background: var(--accent);
    transform: translateX(-50%);
  }

  .center-nut{
    position: absolute;
    top: 50%;
    left: 50%;
    width: 16px;
    height: 16px;
    margin: -8px 0 0 -8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow:
      0 0 0 4px var(--bg),
      2px 2px 6px var(--dark-shadow);
    z-index: 6;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px){
    .wrapper{
      flex-direction: column;
      text-align: center;
      gap: clamp(1.5rem, 6vw, 2.5rem);
    }
    .info{
      max-width: 100%;
    }
    .digital-readout{
      display: flex;
      justify-content: center;
      margin: 0 auto;
      width: fit-content;
    }
  }
</style>
</head>
<body>

  <div class="wrapper">
    <div class="info">
      <h1>Neumorphic Clock</h1>
      <p>Jam analog interaktif dengan gaya Soft UI. Bergerak halus mengikuti waktu perangkat kamu, dibangun murni dengan HTML, CSS, dan JavaScript.</p>
      <div class="digital-readout" id="digitalTime">00:00:00</div>
    </div>

    <div class="clock-outer">
      <div class="clock-face" id="clockFace">
        <!-- markers injected by JS -->
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand minute-hand" id="minuteHand"></div>
        <div class="hand second-hand" id="secondHand"></div>
        <div class="center-nut"></div>
      </div>
    </div>
  </div>

<script>
  const clockFace = document.getElementById('clockFace');

  // Build 12 hour markers
  for(let i = 0; i < 12; i++){
    const marker = document.createElement('div');
    const isMajor = (i % 3 === 0); // 12, 3, 6, 9
    marker.className = 'marker' + (isMajor ? ' major' : '');
    marker.style.transform = `rotate(${i * 30}deg)`;
    clockFace.appendChild(marker);
  }

  const hourHand = document.getElementById('hourHand');
  const minuteHand = document.getElementById('minuteHand');
  const secondHand = document.getElementById('secondHand');
  const digitalTime = document.getElementById('digitalTime');

  function pad(n){
    return n.toString().padStart(2, '0');
  }

  function updateClock(){
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const seconds = now.getSeconds();

    const secondDeg = seconds * 6;
    const minuteDeg = (minutes * 6) + (seconds * 0.1);
    const hourDeg = ((hours % 12) * 30) + (minutes * 0.5);

    hourHand.style.transform = `rotate(${hourDeg}deg)`;
    minuteHand.style.transform = `rotate(${minuteDeg}deg)`;
    secondHand.style.transform = `rotate(${secondDeg}deg)`;

    digitalTime.textContent = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
