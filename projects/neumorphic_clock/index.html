<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Clock UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Bagian Teks Deskripsi -->
        <div class="text-container">
            <h1>Neumorphic Clock</h1>
            <p>Jam analog dengan desain neumorphism yang halus...</p>
        </div>

        <!-- Bagian Jam (Casing Luar) -->
        <div class="clock-case">
            <div class="clock-face">
                <!-- Titik Pusat -->
                <div class="center-nut"></div>
                <!-- Jarum Jam -->
                <div class="hand hour-hand"></div>
                <div class="hand minute-hand"></div>
                <div class="hand second-hand"></div>
            </div>
        </div>
    </div>

</body>
</html>
